<style>
        /* Custom utilities to bridge standard tailwind ring with semantic colors */
        .focus-ring-glow:focus {
            box-shadow: 0 0 0 3px rgba(0, 30, 64, 0.15); /* primary color with opacity */
            border-color: #001e40; /* primary */
        }
    </style>

<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-4 selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Main Login Card -->
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0_4px_30px_-5px_rgba(0,0,0,0.08)] border border-outline-variant overflow-hidden">
<!-- Top Accent Bar -->
<div class="h-1 w-full bg-primary"></div>
<div class="p-lg md:p-xl">
<!-- Brand & Header -->
<header class="text-center mb-xl">
<div class="mx-auto w-16 h-16 bg-primary-fixed rounded-full flex items-center justify-center mb-md shadow-sm border border-primary-fixed-dim">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1; font-size: 32px;">security</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface mb-xs">TrustBank</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Admin Portal</p>
</header>
<!-- Login Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Admin ID Field -->
<div class="space-y-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="adminId">Admin ID</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-size: 20px;">badge</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-outline focus:outline-none focus-ring-glow transition-shadow duration-200" id="adminId" name="adminId" placeholder="Enter your assigned ID" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex items-center justify-between">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-size: 20px;">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-outline focus:outline-none focus-ring-glow transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Secondary Actions -->
<div class="flex items-center justify-between pt-xs">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container-lowest bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant text-[14px] cursor-pointer" for="remember-me">
                            Remember device
                        </label>
</div>
<div class="text-sm">
<a class="font-button text-[14px] text-surface-tint hover:text-primary transition-colors duration-200" href="#">Forgot credentials?</a>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-lg shadow-sm font-button text-button text-on-primary bg-primary hover:bg-on-primary-fixed hover:scale-[1.02] active:scale-95 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                        Secure Login
                        <span class="material-symbols-outlined" style="font-size: 18px;">login</span>
</button>
</div>
</form>
</div>
<!-- Footer Info -->
<div class="bg-surface-container px-lg py-md border-t border-outline-variant text-center">
<p class="font-body-md text-[12px] text-on-surface-variant flex items-center justify-center gap-1.5">
<span class="material-symbols-outlined text-secondary" style="font-size: 14px; font-variation-settings: 'FILL' 1;">verified_user</span>
                Protected by Enterprise Grade Encryption
            </p>
</div>
</main>
</body></html>
